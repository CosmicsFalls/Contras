<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contra Local</title>
    <script src="phaser.min.js"></script> 
</head>
<body>
    <div id="game"></div>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 450,
        parent: 'game',
        scene: {
            create: function() {
                this.add.text(100, 100, '¡PHASER CARGADO LOCALMENTE!', { fill: '#0f0' });
            }
        }
    };
    // Verificador simple
    if (typeof Phaser === 'undefined') {
        document.body.innerHTML = "<h1>Sigue sin detectar el archivo phaser.min.js</h1>";
    } else {
        new Phaser.Game(config);
    }
</script>
</body>
</html>
