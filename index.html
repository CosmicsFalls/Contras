<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra S26 Fix Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        #ui-layer { position: absolute; z-index: 100; text-align: center; }
        .btn-play { padding: 25px 50px; font-size: 24px; background: #e91e63; color: white; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px rgba(233,30,99,0.5); }
        canvas { border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <button class="btn-play" id="launch">CARGAR MISIÓN</button>
    </div>
    <div id="phaser-app"></div>

<script>
document.getElementById('launch').onclick = function() {
    this.parentElement.style.display = 'none';
    
    const config = {
        type: Phaser.CANVAS, // Obligatorio para S26 para evitar pantalla negra
        parent: 'phaser-app',
        width: 800,
        height: 450,
        backgroundColor: '#111',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1000 } }
        },
        scene: { preload: preload, create: create, update: update }
    };

    new Phaser.Game(config);
};

let player, moveL = false, moveR = false;

function preload() {
    // Creamos las texturas aquí mismo para no depender de archivos externos
    let graphics = this.make.graphics();
    
    // Jugador (Cubo Azul)
    graphics.fillStyle(0x00aaff);
    graphics.fillRect(0, 0, 30, 45);
    graphics.generateTexture('hero', 30, 45);
    graphics.clear();

    // Suelo (Verde)
    graphics.fillStyle(0x228b22);
    graphics.fillRect(0, 0, 32, 32);
    graphics.generateTexture('floor', 32, 32);
}

function create() {
    // Crear suelo
    let platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 100; i++) {
        platforms.create(i * 32, 435, 'floor').refresh();
    }

    // Crear jugador
    player = this.physics.add.sprite(100, 300, 'hero');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Controles táctiles invisibles (Pantalla partida)
    // Lado izquierdo = Mover / Lado derecho = Saltar
    this.input.on('pointerdown', (pointer) => {
        if (pointer.x < 400) {
            if (pointer.x < 200) moveL = true;
            else moveR = true;
        } else {
            if (player.body.touching.down) player.setVelocityY(-550);
        }
    });

    this.input.on('pointerup', () => {
        moveL = false;
        moveR = false;
    });

    this.add.text(10, 10, 'Toca Izquierda/Derecha para caminar. Derecha arriba para saltar.', { fontSize: '16px', fill: '#fff' });
}

function update() {
    if (moveL) player.setVelocityX(-250);
    else if (moveR) player.setVelocityX(250);
    else player.setVelocityX(0);
}
</script>
</body>
</html>
