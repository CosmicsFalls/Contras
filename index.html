<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contra Mobile - 3 Enemigos</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 800 }, debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, bullets, enemies, cursors;
let moveLeft = false, moveRight = false;

function preload() {
    // Crear texturas básicas
    const createTex = (key, w, h, color) => {
        let canvas = this.textures.createCanvas(key, w, h);
        canvas.context.fillStyle = color;
        canvas.context.fillRect(0, 0, w, h);
        canvas.refresh();
    };

    createTex('player', 32, 48, '#0000ff');   // Azul
    createTex('soldier', 32, 48, '#ff0000');  // Rojo
    createTex('scout', 20, 40, '#ffa500');    // Naranja (delgado)
    createTex('tank', 50, 40, '#800080');     // Púrpura (gordo)
    createTex('bullet', 10, 5, '#ffff00');    // Amarillo
}

function create() {
    // Plataformas
    platforms = this.physics.add.staticGroup();
    platforms.create(1000, 430, 'player').setScale(70, 2).setTint(0x228b22).refresh();
    platforms.create(500, 320, 'player').setScale(5, 0.5).setTint(0x228b22).refresh();

    // Jugador
    player = this.physics.add.sprite(100, 300, 'player');
    this.physics.add.collider(player, platforms);

    // Cámara
    this.cameras.main.setBounds(0, 0, 2000, 450);
    this.physics.world.setBounds(0, 0, 2000, 450);
    this.cameras.main.startFollow(player);

    // Grupos
    bullets = this.physics.add.group({ classType: Phaser.Physics.Arcade.Image });
    enemies = this.physics.add.group();

    // Función para crear enemigos con datos personalizados
    const spawnEnemy = (x, y, type, speed, health) => {
        let e = enemies.create(x, y, type);
        e.setData('speed', speed);
        e.setData('health', health);
        e.setData('type', type);
        e.setCollideWorldBounds(true);
    };

    // Spawning inicial
    spawnEnemy(600, 300, 'soldier', 100, 1);
    spawnEnemy(900, 300, 'scout', 250, 1);
    spawnEnemy(1200, 300, 'tank', 50, 5);

    this.physics.add.collider(enemies, platforms);

    // Colisión Bala -> Enemigo
    this.physics.add.overlap(bullets, enemies, (bullet, enemy) => {
        bullet.destroy();
        let h = enemy.getData('health') - 1;
        enemy.setData('health', h);
        
        // Efecto visual de daño
        enemy.setAlpha(0.5);
        this.time.delayedCall(100, () => enemy.setAlpha(1));

        if (h <= 0) enemy.destroy();
    });

    // Controles Táctiles
    createButton(this, 50, 370, '←', () => moveLeft = true, () => moveLeft = false);
    createButton(this, 150, 370, '→', () => moveRight = true, () => moveRight = false);
    createButton(this, 620, 370, 'SALTAR', () => { if(player.body.touching.down) player.setVelocityY(-450) });
    createButton(this, 730, 370, 'FUEGO', () => shoot(this));

    cursors = this.input.keyboard.createCursorKeys();
}

function createButton(scene, x, y, text, startFn, endFn) {
    let btn = scene.add.text(x, y, text, { 
        fontSize: '28px', backgroundColor: '#333', padding: 12, color: '#fff' 
    }).setInteractive().setScrollFactor(0);
    
    btn.on('pointerdown', startFn);
    if(endFn) {
        btn.on('pointerup', endFn);
        btn.on('pointerout', endFn);
    }
}

function shoot(scene) {
    let b = bullets.create(player.x + 20, player.y, 'bullet');
    b.body.allowGravity = false;
    b.setVelocityX(500);
}

function update() {
    // Movimiento Jugador
    if (moveLeft || cursors.left.isDown) player.setVelocityX(-200);
    else if (moveRight || cursors.right.isDown) player.setVelocityX(200);
    else player.setVelocityX(0);

    // IA de Enemigos
    enemies.getChildren().forEach(enemy => {
        let distance = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
        let speed = enemy.getData('speed');

        if (distance < 350) { // Rango de detección
            if (player.x < enemy.x) enemy.setVelocityX(-speed);
            else enemy.setVelocityX(speed);
        } else {
            // Patrulla básica o detenerse
            if (Math.random() < 0.01) enemy.setVelocityX(Phaser.Math.Between(-1, 1) * speed);
        }
    });
}
</script>
</body>
</html>
