<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #222; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    parent: 'game-container',
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1000 }, debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, bullets, enemies, cursors;
let moveLeft = false, moveRight = false;

function preload() {
    const createTex = (key, w, h, color) => {
        let canvas = this.textures.createCanvas(key, w, h);
        canvas.context.fillStyle = color;
        canvas.context.fillRect(0, 0, w, h);
        canvas.refresh();
    };
    createTex('player', 30, 45, '#007bff');
    createTex('soldier', 30, 45, '#ff4444');
    createTex('scout', 18, 35, '#ffbb33');
    createTex('tank', 55, 40, '#aa66cc');
    createTex('bullet', 12, 6, '#ffff00');
    createTex('ground', 32, 32, '#2d5a27');
}

function create() {
    platforms = this.physics.add.staticGroup();
    // Suelo extendido para scroll
    for (let i = 0; i < 100; i++) {
        platforms.create(i * 32, 435, 'ground').refresh();
    }
    platforms.create(400, 310, 'ground').setScale(4, 0.5).refresh();
    platforms.create(800, 250, 'ground').setScale(4, 0.5).refresh();

    player = this.physics.add.sprite(100, 300, 'player');
    player.setCollideWorldBounds(false);
    this.physics.add.collider(player, platforms);

    this.cameras.main.setBounds(0, 0, 3000, 450);
    this.physics.world.setBounds(0, 0, 3000, 450);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    bullets = this.physics.add.group({ classType: Phaser.Physics.Arcade.Image });
    enemies = this.physics.add.group();

    const spawn = (x, y, type, speed, hp) => {
        let e = enemies.create(x, y, type);
        e.setData({ speed: speed, health: hp });
    };

    spawn(700, 350, 'soldier', 100, 1);
    spawn(1100, 350, 'scout', 250, 1);
    spawn(1500, 350, 'tank', 60, 5);

    this.physics.add.collider(enemies, platforms);
    this.physics.add.overlap(bullets, enemies, (bullet, enemy) => {
        bullet.destroy();
        let hp = enemy.getData('health') - 1;
        enemy.setData('health', hp);
        if (hp <= 0) enemy.destroy();
    });

    // Botones Táctiles con mejor respuesta
    const addBtn = (x, y, txt, press, release) => {
        let b = this.add.text(x, y, txt, { fontSize: '30px', backgroundColor: '#444', padding: 15 })
            .setInteractive().setScrollFactor(0).setAlpha(0.7);
        b.on('pointerdown', press);
        if(release) b.on('pointerup', release);
    };

    addBtn(20, 350, ' ← ', () => moveLeft = true, () => moveLeft = false);
    addBtn(120, 350, ' → ', () => moveRight = true, () => moveRight = false);
    addBtn(550, 350, ' SALT ', () => { if(player.body.touching.down) player.setVelocityY(-500) });
    addBtn(700, 350, ' FIRE ', () => {
        let b = bullets.create(player.x + 20, player.y, 'bullet');
        b.body.allowGravity = false;
        b.setVelocityX(600);
    });

    cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    if (moveLeft || cursors.left.isDown) player.setVelocityX(-220);
    else if (moveRight || cursors.right.isDown) player.setVelocityX(220);
    else player.setVelocityX(0);

    enemies.getChildren().forEach(e => {
        let dist = Phaser.Math.Distance.Between(player.x, player.y, e.x, e.y);
        if (dist < 400) {
            if (player.x < e.x) e.setVelocityX(-e.getData('speed'));
            else e.setVelocityX(e.getData('speed'));
        }
    });

    if (player.y > 500) player.setPosition(100, 300); // Reset si cae
}
</script>
</body>
</html>
