<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Contra S26 Ultra Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #111; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { 
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #btn-overlay { 
            position: absolute; z-index: 99; background: #007bff; color: white; 
            padding: 20px; border-radius: 10px; font-family: sans-serif; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="btn-overlay">INICIAR MISIÓN</div>
    <div id="game-container"></div>

<script>
const startBtn = document.getElementById('btn-overlay');

startBtn.onclick = () => {
    startBtn.style.display = 'none';
    
    const config = {
        type: Phaser.CANVAS, 
        parent: 'game-container',
        width: 800,
        height: 450,
        backgroundColor: '#000000',
        render: {
            pixelArt: true, // Evita que se vea borroso o con líneas
            antialias: false,
            transparent: false
        },
        scale: {
            mode: Phaser.Scale.FIT, // Ajuste perfecto al ancho del S26
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 1200 } }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
};

function preload() {
    let g = this.make.graphics();
    // Jugador Azul
    g.fillStyle(0x007bff); g.fillRect(0,0,30,45); g.generateTexture('p',30,45);
    g.clear();
    // Suelo Verde
    g.fillStyle(0x2d5a27); g.fillRect(0,0,32,32); g.generateTexture('g',32,32);
}

function create() {
    let platforms = this.physics.add.staticGroup();
    // Suelo sólido
    for (let i = 0; i < 60; i++) {
        platforms.create(i * 32, 435, 'g').refresh();
    }
    
    this.player = this.physics.add.sprite(100, 300, 'p').setCollideWorldBounds(true);
    this.physics.add.collider(this.player, platforms);

    this.moveX = 0;

    // Control táctil: Izquierda/Derecha para mover, arriba de la mitad para saltar
    this.input.on('pointerdown', (p) => {
        if (p.x < 400) {
            this.moveX = (p.x < 200) ? -250 : 250;
        } else {
            if (this.player.body.touching.down) this.player.setVelocityY(-600);
        }
    });

    this.input.on('pointerup', () => this.moveX = 0);
}

function update() {
    this.player.setVelocityX(this.moveX);
}
</script>
</body>
</html>
