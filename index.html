<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra S26 Final Fix</title>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script>window.Phaser || document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"><\/script>')</script>
    <script>window.Phaser || document.write('<script src="https://unpkg.com/phaser@3.60.0/dist/phaser.min.js"><\/script>')</script>

    <style>
        body { margin: 0; background: #111; overflow: hidden; touch-action: none; color: white; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #debug { position: absolute; top: 50%; width: 100%; text-align: center; transform: translateY(-50%); }
        button { padding: 20px; font-size: 20px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="debug">
        <p id="status">Cargando Motor...</p>
        <button id="play-btn" style="display:none">INICIAR JUEGO</button>
    </div>
    <div id="game-container"></div>

<script>
window.onload = () => {
    const status = document.getElementById('status');
    const btn = document.getElementById('play-btn');

    if (typeof Phaser === 'undefined') {
        status.innerHTML = "❌ ERROR CRÍTICO:<br>Tu Samsung bloqueó todas las fuentes.<br><br>SOLUCIÓN:<br>1. Ve a Ajustes del Chrome.<br>2. Privacidad y Seguridad.<br>3. Desactiva 'Navegación Segura Mejorada'.";
        status.style.color = "#ff6666";
    } else {
        status.innerHTML = "✅ Motor Listo en S26";
        btn.style.display = "inline-block";
    }
};

document.getElementById('play-btn').onclick = () => {
    document.getElementById('debug').style.display = 'none';
    
    const config = {
        type: Phaser.CANVAS, // Obligatorio para evitar pantalla negra en S26
        width: 800,
        height: 450,
        parent: 'game-container',
        backgroundColor: '#000',
        physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
        scene: { preload: preload, create: create, update: update }
    };
    new Phaser.Game(config);
};

let player, platforms, moveLeft = false, moveRight = false;

function preload() {
    let g = this.make.graphics();
    g.fillStyle(0x007bff); g.fillRect(0,0,30,45); g.generateTexture('p',30,45);
    g.clear();
    g.fillStyle(0x2d5a27); g.fillRect(0,0,32,32); g.generateTexture('g',32,32);
}

function create() {
    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 60; i++) platforms.create(i * 32, 435, 'g').refresh();
    player = this.physics.add.sprite(100, 300, 'p').setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    const btn = (x, y, txt, dn, up) => {
        let b = this.add.text(x, y, txt, { fontSize: '40px', backgroundColor: '#333', padding: 20 }).setInteractive().setScrollFactor(0);
        b.on('pointerdown', dn); b.on('pointerup', up).on('pointerout', up);
    };

    btn(50, 330, ' ← ', () => moveLeft = true, () => moveLeft = false);
    btn(180, 330, ' → ', () => moveRight = true, () => moveRight = false);
    btn(600, 330, ' SALT ', () => { if(player.body.touching.down) player.setVelocityY(-550) });
}

function update() {
    if (moveLeft) player.setVelocityX(-250);
    else if (moveRight) player.setVelocityX(250);
    else player.setVelocityX(0);
}
</script>
</body>
</html>
