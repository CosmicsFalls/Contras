<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra Mobile Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 450,
    parent: 'game-container',
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1000 }, debug: false } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, bullets, enemies, cursors;
let moveLeft = false, moveRight = false;

function preload() {
    const createTex = (key, w, h, color) => {
        let canvas = this.textures.createCanvas(key, w, h);
        canvas.context.fillStyle = color;
        canvas.context.fillRect(0, 0, w, h);
        canvas.refresh();
    };

    createTex('player', 30, 45, '#007bff');   // Jugador
    createTex('soldier', 30, 45, '#ff4444');  // Soldado
    createTex('scout', 18, 35, '#ffbb33');    // Rápido
    createTex('tank', 55, 40, '#aa66cc');     // Tanque
    createTex('bullet', 12, 6, '#ffff00');    // Bala
}

function create() {
    // Escenario
    platforms = this.physics.add.staticGroup();
    platforms.create(1000, 435, 'player').setScale(70, 1.5).setTint(0x2d5a27).refresh();
    platforms.create(400, 310, 'player').setScale(4, 0.4).setTint(0x2d5a27).refresh();
    platforms.create(750, 220, 'player').setScale(4, 0.4).setTint(0x2d5a27).refresh();

    // Jugador
    player = this.physics.add.sprite(100, 300, 'player');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Cámara y Mundo
    this.cameras.main.setBounds(0, 0, 2000, 450);
    this.physics.world.setBounds(0, 0, 2000, 450);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    // Grupos
    bullets = this.physics.add.group({ classType: Phaser.Physics.Arcade.Image });
    enemies = this.physics.add.group();

    const spawn = (x, y, type, speed, hp) => {
        let e = enemies.create(x, y, type);
        e.setData({ speed: speed, health: hp });
        e.setCollideWorldBounds(true);
    };

    // Spawn de los 3 tipos
    spawn(600, 350, 'soldier', 100, 1);
    spawn(1000, 350, 'scout', 260, 1);
    spawn(1400, 350, 'tank', 50, 5);

    this.physics.add.collider(enemies, platforms);

    // Combate
    this.physics.add.overlap(bullets, enemies, (bullet, enemy) => {
        bullet.destroy();
        let hp = enemy.getData('health') - 1;
        enemy.setData('health', hp);
        enemy.setTint(0xffffff);
        this.time.delayedCall(100, () => enemy.clearTint());
        if (hp <= 0) enemy.destroy();
    });

    // Controles para Celular (Visuales)
    const btnStyle = { fontSize: '24px', backgroundColor: '#444', padding: 12, color: '#fff' };
    
    let btnL = this.add.text(30, 360, ' ← ', btnStyle).setInteractive().setScrollFactor(0);
    let btnR = this.add.text(130, 360, ' → ', btnStyle).setInteractive().setScrollFactor(0);
    let btnJump = this.add.text(580, 360, ' SALTO ', btnStyle).setInteractive().setScrollFactor(0);
    let btnFire = this.add.text(700, 360, ' FUEGO ', btnStyle).setInteractive().setScrollFactor(0);

    btnL.on('pointerdown', () => moveLeft = true).on('pointerup', () => moveLeft = false);
    btnR.on('pointerdown', () => moveRight = true).on('pointerup', () => moveRight = false);
    btnJump.on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(-480); });
    btnFire.on('pointerdown', () => {
        let b = bullets.create(player.x + 20, player.y, 'bullet');
        b.body.allowGravity = false;
        b.setVelocityX(550);
    });

    cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    if (moveLeft || cursors.left.isDown) player.setVelocityX(-220);
    else if (moveRight || cursors.right.isDown) player.setVelocityX(220);
    else player.setVelocityX(0);

    enemies.getChildren().forEach(e => {
        let dist = Phaser.Math.Distance.Between(player.x, player.y, e.x, e.y);
        if (dist < 350) {
            if (player.x < e.x) e.setVelocityX(-e.getData('speed'));
            else e.setVelocityX(e.getData('speed'));
        }
    });
}
</script>
</body>
</html>
