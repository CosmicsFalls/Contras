<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra S26 Total Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-ce.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 800px; height: 450px; background: #111; display: none; }
        #error-ui { text-align: center; padding: 20px; }
        .btn { padding: 15px 30px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="error-ui">
        <h2 id="status">Verificando...</h2>
        <p id="sub-status">Si ves esto, espera 3 segundos.</p>
        <button id="start-btn" class="btn" style="display:none">JUGAR AHORA</button>
    </div>
    <div id="game-container"></div>

<script>
window.addEventListener('load', () => {
    const status = document.getElementById('status');
    const sub = document.getElementById('sub-status');
    const btn = document.getElementById('start-btn');

    // Intentar detectar Phaser con un pequeño retraso
    setTimeout(() => {
        if (typeof Phaser === 'undefined') {
            status.innerHTML = "❌ SIGUE BLOQUEADO";
            sub.innerHTML = "Tu S26 tiene un filtro de red activo.<br><b>PRUEBA ESTO:</b> Apaga el WiFi y usa tus Datos Móviles.";
            status.style.color = "#ff4444";
        } else {
            status.innerHTML = "✅ MOTOR CARGADO";
            sub.innerHTML = "Presiona el botón para entrar al juego.";
            btn.style.display = "inline-block";
        }
    }, 1000);
});

document.getElementById('start-btn').onclick = function() {
    document.getElementById('error-ui').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    
    const config = {
        type: Phaser.CANVAS,
        width: 800,
        height: 450,
        parent: 'game-container',
        physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
        scene: { preload: preload, create: create, update: update }
    };
    new Phaser.Game(config);
};

let player, platforms, moveLeft = false, moveRight = false;

function preload() {
    let g = this.make.graphics();
    g.fillStyle(0x007bff); g.fillRect(0,0,30,45); g.generateTexture('p',30,45);
    g.clear();
    g.fillStyle(0x2d5a27); g.fillRect(0,0,32,32); g.generateTexture('g',32,32);
}

function create() {
    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 50; i++) platforms.create(i * 32, 435, 'g').refresh();
    player = this.physics.add.sprite(100, 300, 'p').setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    const makeBtn = (x, y, txt, dn, up) => {
        let b = this.add.text(x, y, txt, { fontSize: '40px', backgroundColor: '#333', padding: 20 }).setInteractive().setScrollFactor(0);
        b.on('pointerdown', dn); b.on('pointerup', up).on('pointerout', up);
    };

    makeBtn(50, 330, ' ← ', () => moveLeft = true, () => moveLeft = false);
    makeBtn(180, 330, ' → ', () => moveRight = true, () => moveRight = false);
    makeBtn(600, 330, ' SALTO ', () => { if(player.body.touching.down) player.setVelocityY(-550) });
}

function update() {
    if (moveLeft) player.setVelocityX(-250);
    else if (moveRight) player.setVelocityX(250);
    else player.setVelocityX(0);
}
</script>
</body>
</html>
