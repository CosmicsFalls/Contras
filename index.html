<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra Final S26</title>
    <script src="https://ajax.googleapis.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; color: white; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; }
        #loading-ui { position: absolute; width: 100%; top: 40%; text-align: center; }
    </style>
</head>
<body>
    <div id="loading-ui">Iniciando sistema...</div>
<script>
const config = {
    type: Phaser.CANVAS, // Forzamos CANVAS para que el S26 no se bloquee con WebGL
    width: 800,
    height: 450,
    backgroundColor: '#111',
    physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
    scene: { preload: preload, create: create, update: update }
};

let game;
try {
    game = new Phaser.Game(config);
} catch (e) {
    document.getElementById('loading-ui').innerHTML = "Fallo al iniciar motor.";
}

let player, platforms, moveLeft = false, moveRight = false, cursors;

function preload() {
    let g = this.make.graphics();
    g.fillStyle(0x007bff); g.fillRect(0,0,30,45); g.generateTexture('p',30,45);
    g.clear();
    g.fillStyle(0x2d5a27); g.fillRect(0,0,32,32); g.generateTexture('g',32,32);
}

function create() {
    document.getElementById('loading-ui').style.display = 'none';
    
    platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 80; i++) platforms.create(i * 32, 435, 'g').refresh();

    player = this.physics.add.sprite(100, 300, 'p').setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    const addBtn = (x, y, txt, dn, up) => {
        let b = this.add.text(x, y, txt, { fontSize: '40px', backgroundColor: '#333', padding: 20 })
            .setInteractive().setScrollFactor(0);
        b.on('pointerdown', dn);
        if(up) b.on('pointerup', up).on('pointerout', up);
    };

    addBtn(50, 320, ' ← ', () => moveLeft = true, () => moveLeft = false);
    addBtn(180, 320, ' → ', () => moveRight = true, () => moveRight = false);
    addBtn(600, 320, ' SALT ', () => { if(player.body.touching.down) player.setVelocityY(-550) });

    cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    if (moveLeft || (cursors && cursors.left.isDown)) player.setVelocityX(-250);
    else if (moveRight || (cursors && cursors.right.isDown)) player.setVelocityX(250);
    else player.setVelocityX(0);
}
</script>
</body>
</html>
