<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra Final S26</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 100%; height: 100%; }
        #ui { position: absolute; z-index: 10; color: white; text-align: center; }
        button { padding: 20px 40px; font-size: 25px; background: #007bff; color: white; border: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <button id="start-btn">¡INICIAR MISIÓN!</button>
    </div>
    <div id="game-container"></div>

<script>
document.getElementById('start-btn').onclick = function() {
    document.getElementById('ui').style.display = 'none';
    iniciarJuego();
};

function iniciarJuego() {
    const config = {
        type: Phaser.AUTO, // Deja que el S26 elija lo mejor
        parent: 'game-container',
        width: 800,
        height: 450,
        backgroundColor: '#111',
        scale: {
            mode: Phaser.Scale.FIT, // Esto hace que se adapte a tu pantalla
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: { 
            default: 'arcade', 
            arcade: { gravity: { y: 1000 }, debug: false } 
        },
        scene: { preload: preload, create: create, update: update }
    };
    new Phaser.Game(config);
}

let player, moveLeft = false, moveRight = false;

function preload() {
    let g = this.make.graphics();
    // Jugador (Azul)
    g.fillStyle(0x007bff); g.fillRect(0,0,30,45); g.generateTexture('p',30,45);
    g.clear();
    // Suelo (Verde)
    g.fillStyle(0x2d5a27); g.fillRect(0,0,32,32); g.generateTexture('g',32,32);
}

function create() {
    let platforms = this.physics.add.staticGroup();
    for (let i = 0; i < 100; i++) {
        platforms.create(i * 32, 435, 'g').refresh();
    }

    player = this.physics.add.sprite(100, 300, 'p').setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // CONTROLES TÁCTILES MEJORADOS
    const addControl = (x, y, txt, onPress, onRelease) => {
        let b = this.add.text(x, y, txt, { 
            fontSize: '50px', 
            backgroundColor: '#444', 
            padding: 20 
        }).setInteractive().setScrollFactor(0).setAlpha(0.7);
        
        b.on('pointerdown', onPress);
        b.on('pointerup', onRelease);
        b.on('pointerout', onRelease);
    };

    addControl(50, 300, ' ← ', () => moveLeft = true, () => moveLeft = false);
    addControl(220, 300, ' → ', () => moveRight = true, () => moveRight = false);
    addControl(600, 300, ' SALTO ', () => { 
        if(player.body.touching.down) player.setVelocityY(-550); 
    }, () => {});
}

function update() {
    if (moveLeft) player.setVelocityX(-250);
    else if (moveRight) player.setVelocityX(250);
    else player.setVelocityX(0);
}
</script>
