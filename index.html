<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Contra Ultra-Compat</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: red; overflow: hidden; touch-action: none; }
        canvas { cursor: crosshair; }
    </style>
</head>
<body>
<script>
// Configuración simplificada al extremo
const config = {
    type: Phaser.AUTO, // Dejamos que el motor decida lo mejor
    width: 800,
    height: 450,
    backgroundColor: '#1a1a1a', // Gris casi negro
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 1000 } } 
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player, platforms, moveLeft = false, moveRight = false, cursors;

function preload() {
    // Generar texturas de emergencia si no hay imágenes
    let graphics = this.make.graphics();
    
    // Jugador (Rectángulo Azul)
    graphics.fillStyle(0x00aaff, 1);
    graphics.fillRect(0, 0, 32, 48);
    graphics.generateTexture('p', 32, 48);
    graphics.clear();

    // Suelo (Rectángulo Verde)
    graphics.fillStyle(0x00ff00, 1);
    graphics.fillRect(0, 0, 32, 32);
    graphics.generateTexture('g', 32, 32);
}

function create() {
    // Fondo de éxito (Verde oscuro para saber que cargó Phaser)
    this.cameras.main.setBackgroundColor('#0e230e');

    platforms = this.physics.add.staticGroup();
    // Crear suelo
    for (let i = 0; i < 40; i++) {
        platforms.create(i * 32, 434, 'g').refresh();
    }

    player = this.physics.add.sprite(100, 200, 'p');
    player.setCollideWorldBounds(true);
    this.physics.add.collider(player, platforms);

    // Botones ultra-simples (Texto plano)
    let bL = this.add.text(50, 350, 'IZQ', { fontSize: '40px', fill: '#fff', backgroundColor: '#333' })
        .setInteractive().setScrollFactor(0);
    let bR = this.add.text(200, 350, 'DER', { fontSize: '40px', fill: '#fff', backgroundColor: '#333' })
        .setInteractive().setScrollFactor(0);
    let bJ = this.add.text(600, 350, 'SALT', { fontSize: '40px', fill: '#fff', backgroundColor: '#333' })
        .setInteractive().setScrollFactor(0);

    bL.on('pointerdown', () => moveLeft = true).on('pointerup', () => moveLeft = false);
    bR.on('pointerdown', () => moveRight = true).on('pointerup', () => moveRight = false);
    bJ.on('pointerdown', () => { if(player.body.touching.down) player.setVelocityY(-500); });

    cursors = this.input.keyboard.createCursorKeys();
}

function update() {
    if (moveLeft || cursors.left.isDown) player.setVelocityX(-200);
    else if (moveRight || cursors.right.isDown) player.setVelocityX(200);
    else player.setVelocityX(0);
}
</script>
</body>
</html>
